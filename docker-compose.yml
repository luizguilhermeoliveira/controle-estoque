services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: estoque-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - estoque

  nginx:
    image: nginx:alpine
    container_name: estoque-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - estoque

  db:
    image: mariadb:11
    container_name: estoque-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-controle_estoque}
      MARIADB_USER: ${DB_USERNAME:-estoque}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estoque

  redis:
    image: redis:7-alpine
    container_name: estoque-redis
    restart: unless-stopped
    networks:
      - estoque

  adminer:
    image: adminer:latest
    container_name: estoque-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - estoque

volumes:
  dbdata:

networks:
  estoque:
    driver: bridge
